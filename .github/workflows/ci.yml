name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: bun

      - run: bun install --frozen-lockfile
      - run: bun x oxfmt --check
      - run: bun x oxlint --format=github
